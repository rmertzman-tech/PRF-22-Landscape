<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRF-22 Topological Landscape Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060d1a;--panel:#0a1528;--panel2:#0f1e35;
  --border:#1a2d4a;--border2:#243d5e;
  --text:#b8cce0;--text-bright:#dceeff;--text-dim:#5a7a9a;
  --teal:#14b8a6;--teal-dark:#0d9488;--teal-light:#5eead4;
  --gold:#c9a84c;--gold-light:#f0d070;
  --red:#ef4444;--red-dim:#7f1d1d;
  --scrollbar:#1a2d4a;
  --fa:#2563eb;--fb:#dc2626;--fc:#7c3aed;--fd:#d97706;
  --fe:#059669;--ff:#0891b2;--fg:#0f766e;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:5px;background:var(--scrollbar)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── LAYOUT ─────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{flex:0 0 auto;display:flex;align-items:center;gap:1rem;padding:.55rem 1rem;
  background:var(--panel2);border-bottom:1px solid var(--border2);z-index:10}
#main-area{flex:1;display:flex;min-height:0;overflow:hidden}
#left-panel{width:240px;flex:0 0 240px;overflow-y:auto;background:var(--panel);
  border-right:1px solid var(--border);padding:0}
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg)}
#right-panel{width:210px;flex:0 0 210px;overflow-y:auto;background:var(--panel);
  border-left:1px solid var(--border);padding:.75rem}
#anim-bar{flex:0 0 auto;background:var(--panel2);border-top:1px solid var(--border2);padding:.5rem 1rem}

/* ── HEADER ─────────────────────────────────────── */
#logo{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:700;
  color:var(--teal-light);letter-spacing:.04em;white-space:nowrap}
#logo span{color:var(--gold);font-style:italic}
#profile-name{flex:1;background:transparent;border:1px solid var(--border2);
  border-radius:4px;padding:.25rem .6rem;color:var(--text-bright);font-size:.8rem;
  font-family:'JetBrains Mono',monospace;max-width:240px}
#profile-name:focus{outline:none;border-color:var(--teal)}
#profile-name::placeholder{color:var(--text-dim)}
.hdr-btn{padding:.3rem .7rem;border-radius:4px;border:1px solid var(--border2);
  background:var(--panel);color:var(--text);font-size:.72rem;cursor:pointer;
  font-family:'JetBrains Mono',monospace;transition:.15s}
.hdr-btn:hover{border-color:var(--teal);color:var(--teal-light)}
.hdr-btn.primary{border-color:var(--gold);color:var(--gold)}
.hdr-btn.primary:hover{background:rgba(201,168,76,.15)}
.hdr-sep{width:1px;height:20px;background:var(--border2)}

/* ── INPUT PANEL ─────────────────────────────────── */
.factor-block{border-bottom:1px solid var(--border)}
.factor-header{display:flex;align-items:center;gap:.45rem;padding:.55rem .75rem .45rem;
  cursor:pointer;user-select:none;position:sticky;top:0;background:var(--panel);z-index:2}
.factor-header:hover{background:var(--panel2)}
.factor-dot{width:10px;height:10px;border-radius:50%;flex:0 0 10px}
.factor-name{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:.88rem;
  color:var(--text-bright);flex:1}
.factor-score-badge{font-size:.72rem;padding:.1rem .4rem;border-radius:3px;
  font-family:'JetBrains Mono',monospace;font-weight:600}
.factor-items{padding:.3rem .6rem .5rem}
.item-row{margin-bottom:.55rem}
.item-label{font-size:.65rem;color:var(--text-dim);margin-bottom:.2rem;
  display:flex;justify-content:space-between;line-height:1.3}
.item-label span{color:var(--gold);font-weight:600;font-size:.68rem}
.item-q{font-size:.7rem;color:var(--text);margin-bottom:.25rem;line-height:1.4;
  border-left:2px solid var(--border2);padding-left:.4rem;font-family:'Cormorant Garamond',serif;font-style:italic}
.item-slider-row{display:flex;align-items:center;gap:.4rem}
input[type=range].prf-slider{flex:1;height:4px;border-radius:2px;
  -webkit-appearance:none;cursor:pointer;outline:none}
input[type=range].prf-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;cursor:pointer;border:2px solid var(--bg)}
.item-val{font-size:.75rem;font-family:'JetBrains Mono',monospace;color:var(--gold-light);
  min-width:1.4rem;text-align:right}
.scale-labels{display:flex;justify-content:space-between;font-size:.58rem;
  color:var(--text-dim);margin-top:.1rem;padding:0 .1rem}
.reversed-tag{font-size:.58rem;color:#f87171;margin-left:.3rem}

/* ── CANVAS AREA ─────────────────────────────────── */
#terrain-canvas{display:block;width:100%;height:100%}
#label-overlay{position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;overflow:hidden}
.peak-label{position:absolute;transform:translate(-50%,-50%);
  padding:.2rem .45rem .25rem;border-radius:4px;pointer-events:none;
  border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(4px);
  text-align:center;white-space:nowrap;transition:left .05s,top .05s}
.peak-label-name{font-family:'Cormorant Garamond',serif;font-size:.72rem;
  font-weight:700;display:block;letter-spacing:.03em}
.peak-label-score{font-size:.65rem;font-family:'JetBrains Mono',monospace;
  opacity:.85;display:block}
#view-btns{position:absolute;bottom:.75rem;right:.75rem;display:flex;flex-direction:column;gap:.3rem}
.view-btn{padding:.25rem .5rem;border:1px solid var(--border2);border-radius:3px;
  background:rgba(10,21,40,.75);color:var(--text-dim);font-size:.65rem;cursor:pointer;
  font-family:'JetBrains Mono',monospace;transition:.15s;white-space:nowrap}
.view-btn:hover{border-color:var(--teal);color:var(--teal-light)}
#compass{position:absolute;top:.75rem;right:.75rem;
  font-size:.7rem;color:var(--text-dim);text-align:center;
  background:rgba(10,21,40,.65);border:1px solid var(--border);
  padding:.3rem .5rem;border-radius:4px}

/* ── RIGHT PANEL ─────────────────────────────────── */
.rp-section{margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.rp-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;
  color:var(--text-dim);margin-bottom:.45rem}
.rp-title{font-family:'Cormorant Garamond',serif;font-size:.85rem;font-weight:700;
  color:var(--text-bright);margin-bottom:.35rem}
.factor-legend-row{display:flex;align-items:center;gap:.4rem;margin-bottom:.35rem}
.fl-dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px}
.fl-text{font-size:.65rem;color:var(--text)}
.fl-text strong{color:var(--text-bright);display:block;font-size:.7rem;
  font-family:'Cormorant Garamond',serif;font-weight:700}
.mode-toggle{display:flex;border:1px solid var(--border2);border-radius:4px;overflow:hidden;margin-bottom:.6rem}
.mode-btn{flex:1;padding:.3rem;text-align:center;font-size:.68rem;cursor:pointer;
  background:transparent;border:none;color:var(--text-dim);transition:.15s;
  font-family:'JetBrains Mono',monospace}
.mode-btn.active{background:var(--teal-dark);color:white}
.rp-slider-row{display:flex;align-items:center;gap:.4rem;margin-bottom:.5rem}
.rp-slider-label{font-size:.68rem;color:var(--text);flex:1}
input[type=range].rp-slider{flex:1;height:3px;-webkit-appearance:none;
  cursor:pointer;border-radius:2px;outline:none;
  background:linear-gradient(90deg,var(--teal) var(--pct,50%),var(--border2) var(--pct,50%))}
input[type=range].rp-slider::-webkit-slider-thumb{-webkit-appearance:none;
  width:11px;height:11px;border-radius:50%;background:var(--teal-light);cursor:pointer}
.rp-val{font-size:.7rem;color:var(--teal-light);min-width:1.8rem;text-align:right;
  font-family:'JetBrains Mono',monospace}
.full-btn{width:100%;padding:.35rem;border-radius:4px;border:1px solid var(--border2);
  background:var(--panel2);color:var(--text);font-size:.7rem;cursor:pointer;
  font-family:'JetBrains Mono',monospace;transition:.15s;margin-bottom:.4rem}
.full-btn:hover{border-color:var(--teal);color:var(--teal-light)}
.full-btn.accent{border-color:var(--gold);color:var(--gold)}
.full-btn.accent:hover{background:rgba(201,168,76,.12)}
.full-btn.danger{border-color:var(--red);color:var(--red)}

/* ── ANIMATION BAR ───────────────────────────────── */
#anim-bar{display:flex;flex-direction:column;gap:.35rem}
#anim-controls{display:flex;align-items:center;gap:.75rem}
.anim-btn{padding:.25rem .55rem;border-radius:3px;border:1px solid var(--border2);
  background:var(--panel);color:var(--text);font-size:.72rem;cursor:pointer;
  font-family:'JetBrains Mono',monospace;transition:.15s}
.anim-btn:hover{border-color:var(--teal);color:var(--teal-light)}
.anim-btn.active{background:var(--teal-dark);border-color:var(--teal);color:white}
#anim-progress-wrap{flex:1;position:relative;height:6px;background:var(--border);
  border-radius:3px;cursor:pointer}
#anim-progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));
  border-radius:3px;width:0%;transition:width .05s linear}
#anim-progress-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);
  width:14px;height:14px;border-radius:50%;background:white;
  border:2px solid var(--teal);left:0%;cursor:grab}
#anim-labels{display:flex;justify-content:space-between;font-size:.62rem;
  color:var(--text-dim);font-family:'JetBrains Mono',monospace}
#tn-setup-toggle{font-size:.72rem;color:var(--text-dim);cursor:pointer;
  text-decoration:none;padding:.1rem .4rem;border-radius:3px;border:1px solid var(--border)}
#tn-setup-toggle:hover{color:var(--gold);border-color:var(--gold)}
#tn-panel{display:none;padding:.5rem .25rem 0;border-top:1px solid var(--border);
  max-height:160px;overflow-y:auto}
.tn-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.25rem .5rem}
.tn-item{display:flex;flex-direction:column;gap:.1rem}
.tn-item-label{font-size:.58rem;color:var(--text-dim)}
.tn-item-row{display:flex;align-items:center;gap:.3rem}
input[type=range].tn-slider{flex:1;height:3px;-webkit-appearance:none;cursor:pointer;
  border-radius:2px;outline:none}
input[type=range].tn-slider::-webkit-slider-thumb{-webkit-appearance:none;
  width:9px;height:9px;border-radius:50%;cursor:pointer}
.tn-val{font-size:.62rem;font-family:'JetBrains Mono',monospace;
  color:var(--text-dim);min-width:1rem;text-align:right}

/* ── PRINT ───────────────────────────────────────── */
@media print{
  #left-panel,#right-panel,#anim-bar,header{display:none!important}
  #canvas-wrap{width:100vw!important;height:100vh!important}
  body{background:white}
}

/* ── Simple / Student Panel ── */
#simple-panel{width:240px;flex:0 0 240px;overflow-y:auto;background:var(--panel);
  border-right:1px solid var(--border);padding:.75rem .65rem;display:none}
.sp-factor-row{margin-bottom:.8rem;padding:.6rem .7rem;
  border:1px solid var(--border);border-radius:.45rem;background:var(--panel2)}
.sp-factor-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.3rem}
.sp-factor-name{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:700}
.sp-factor-abbr{font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--text-dim)}
.sp-factor-desc{font-size:.65rem;color:var(--text-dim);margin-bottom:.45rem;line-height:1.4}
.sp-slider-row{display:flex;align-items:center;gap:.4rem}
input[type=range].sp-slider{flex:1;height:6px;border-radius:3px;
  -webkit-appearance:none;cursor:pointer;outline:none}
input[type=range].sp-slider::-webkit-slider-thumb{-webkit-appearance:none;
  width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid var(--bg)}
.sp-val{font-size:1rem;font-family:'JetBrains Mono',monospace;
  color:var(--gold-light);min-width:2rem;text-align:right;font-weight:600}
.sp-scale{display:flex;justify-content:space-between;font-size:.58rem;
  color:var(--text-dim);margin-top:.25rem;padding:0 .1rem}
.sp-item-list{margin-top:.4rem;padding-top:.4rem;border-top:1px solid var(--border)}
.sp-item-chip{display:inline-block;font-size:.58rem;
  font-family:'JetBrains Mono',monospace;color:var(--text-dim);
  background:rgba(255,255,255,.04);border-radius:2px;padding:.1rem .3rem;
  margin:.1rem .1rem 0 0;line-height:1.5}
/* Mode toggle button */
.mode-toggle-btn{padding:.28rem .65rem;border-radius:4px;font-size:.72rem;cursor:pointer;
  font-family:'JetBrains Mono',monospace;transition:.15s;border:1px solid var(--border2);
  background:var(--panel);color:var(--text-dim)}
.mode-toggle-btn.active{border-color:var(--teal);background:var(--teal-dark);color:white}

</style>
</head>
<body>
<div id="app">

<!-- ── HEADER ── -->
<header>
  <div id="logo">PRF<span>-22</span> LANDSCAPE</div>
  <div class="hdr-sep"></div>
  <button class="mode-toggle-btn active" id="btn-mode-student" title="Student view: 7 factor scores">◫ Student</button>
  <button class="mode-toggle-btn" id="btn-mode-researcher" title="Researcher view: all 22 items">⊞ Researcher</button>
  <div class="hdr-sep"></div>
  <input id="profile-name" type="text" placeholder="Profile name / subject…" maxlength="60">
  <div class="hdr-sep"></div>
  <button class="hdr-btn primary" id="btn-dl-color" title="Download color PNG">⬇ Color PNG</button>
  <button class="hdr-btn" id="btn-dl-grey" title="Download greyscale PNG">⬇ Greyscale PNG</button>
  <button class="hdr-btn" id="btn-print" title="Print">⎙ Print</button>
  <div class="hdr-sep"></div>
  <button class="hdr-btn" id="btn-reset-all" title="Reset all inputs to 3">↺ Reset</button>
</header>

<!-- ── MAIN ── -->
<div id="main-area">

  <!-- LEFT: t0 Inputs -->
  <aside id="left-panel" id="t0-panel"></aside>

  <!-- SIMPLE (Student) input panel -->
  <aside id="simple-panel"></aside>

  <!-- CENTER: canvas -->
  <section id="canvas-wrap">
    <canvas id="terrain-canvas"></canvas>
    <div id="label-overlay"></div>
    <div id="view-btns">
      <button class="view-btn" data-view="iso">Isometric</button>
      <button class="view-btn" data-view="top">Top View</button>
      <button class="view-btn" data-view="north">North Face</button>
      <button class="view-btn" data-view="east">East Face</button>
      <button class="view-btn" data-view="south">South Face</button>
      <button class="view-btn" data-view="west">West Face</button>
    </div>
    <div id="compass">N↑</div>
  </section>

  <!-- RIGHT: Controls -->
  <aside id="right-panel">

    <div class="rp-section">
      <div class="rp-label">Color Mode</div>
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-color">Color</button>
        <button class="mode-btn" id="mode-grey">Greyscale</button>
      </div>
      <div class="rp-label">Height Scale</div>
      <div class="rp-slider-row">
        <span class="rp-slider-label">Exaggeration</span>
        <input type="range" class="rp-slider" id="exag-slider" min="5" max="30" value="12" step="1"
          style="--pct:44%">
        <span class="rp-val" id="exag-val">1.2×</span>
      </div>
      <div class="rp-label" style="margin-top:.5rem">Sigma (spread)</div>
      <div class="rp-slider-row">
        <span class="rp-slider-label">Peak width</span>
        <input type="range" class="rp-slider" id="sigma-slider" min="3" max="15" value="8" step="1"
          style="--pct:45%">
        <span class="rp-val" id="sigma-val">0.8</span>
      </div>
    </div>

    <div class="rp-section">
      <div class="rp-label">Factor Legend</div>
      <div id="legend-rows"></div>
    </div>

    <div class="rp-section">
      <div class="rp-label">Factor Scores (t=0)</div>
      <div id="score-bars"></div>
    </div>

    <div class="rp-section" style="border-bottom:none">
      <button class="full-btn accent" id="btn-copy-to-tn">Copy t=0 → t=n</button>
      <button class="full-btn" id="btn-swap">Swap t=0 ↔ t=n</button>
    </div>

  </aside>
</div>

<!-- ── ANIMATION BAR ── -->
<div id="anim-bar">
  <div id="anim-controls">
    <span style="font-size:.68rem;color:var(--text-dim)">ANIMATION</span>
    <button class="anim-btn" id="btn-anim-play">▶ Play</button>
    <button class="anim-btn" id="btn-anim-reset">■ Reset</button>
    <div id="anim-progress-wrap">
      <div id="anim-progress-fill"></div>
      <div id="anim-progress-thumb"></div>
    </div>
    <div style="display:flex;align-items:center;gap:.4rem">
      <span style="font-size:.65rem;color:var(--text-dim)">Duration</span>
      <input type="range" class="rp-slider" id="dur-slider" min="1" max="20" value="6" step="1"
        style="width:70px;--pct:26%">
      <span class="rp-val" id="dur-val">6s</span>
    </div>
    <button class="anim-btn" id="tn-setup-toggle">t=n Setup ▾</button>
  </div>
  <div id="anim-labels">
    <span>t = 0 (current PRF)</span>
    <span id="anim-pct-label">0%</span>
    <span>t = n (target PRF)</span>
  </div>
  <div id="tn-panel">
    <div class="tn-grid" id="tn-grid"></div>
  </div>
</div>

</div><!-- /app -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// PRF-22 INSTRUMENT DATA
// Items adapted from MFQ, EPQ, PVQ, DIT, WVS, ATCF frameworks.
// * = approximate (replace with validated PRF-22 wording when finalized)
// ═══════════════════════════════════════════════════════════════
const ITEMS = [
  {id:1,fid:'A',short:'Care',
   q:'It is important to interrupt what\'s happening to comfort the person who is hurt.',
   scenario:'At a party, someone makes a cutting remark. You see the target become visibly upset and withdraw.',
   reversed:false},
  {id:2,fid:'A',short:'Fairness',
   q:'You should notify the employer and return the extra money so things are fair.',
   scenario:'You learn your employer accidentally overpaid you this month, and no one else noticed.',
   reversed:false},
  {id:3,fid:'B',short:'Loyalty',
   q:'You should defend your friend publicly to show solidarity.',
   scenario:'A close friend is being publicly criticized online in a way you think is unfair. Defending them might draw negative attention to you.',
   reversed:false},
  {id:4,fid:'B',short:'Authority',
   q:'People should follow the leader\'s procedure out of respect for the role and hierarchy.',
   scenario:'In a volunteer organization, a respected leader asks everyone to follow a formal procedure that feels unnecessary but maintains order.',
   reversed:false},
  {id:5,fid:'B',short:'Purity',
   q:'When something feels disgusting, that reaction is an important moral signal about what should or should not be allowed in shared spaces.',
   scenario:'A friend decorates their apartment in a way you find disgusting, but they genuinely love it and feel it expresses them.',
   reversed:false},
  {id:6,fid:'C',short:'Idealism-1',
   q:'If there is any risk of harm, even a small risk, you should not intervene.',
   scenario:'You can help a stranger by intervening in a conflict, but doing so carries a small risk that someone might get hurt (including you).',
   reversed:false},
  {id:7,fid:'C',short:'Idealism-2',
   q:'It is never morally acceptable to intentionally cause emotional distress, even if the long-term outcome could be beneficial.',
   scenario:'You are considering telling a harsh truth that would likely motivate someone to improve, but it would also clearly cause them emotional pain.',
   reversed:false},
  {id:8,fid:'C',short:'Relativism',
   q:'Sometimes breaking a rule is morally acceptable if the outcome is good.',
   scenario:'A rule exists to prevent chaos, but in one specific case breaking it would clearly help someone without harming anyone else.',
   reversed:true},
  {id:9,fid:'D',short:'Universalism',
   q:'It is very important to me to help people in need, even if they are far away or I don\'t know them.',
   scenario:'You have extra money you could spend on yourself or donate to an effective charity helping people you will never meet.',
   reversed:false},
  {id:10,fid:'D',short:'Benevolence',
   q:'I feel a strong responsibility to help people close to me when they are struggling.',
   scenario:'A close friend is overwhelmed by problems they didn\'t create and asks for help you can realistically provide.',
   reversed:false},
  {id:11,fid:'D',short:'Conformity',
   q:'It is important to follow social norms in order to avoid upsetting others.',
   scenario:'In your community, a harmless social norm is widely followed (e.g., a dress norm at events). You dislike it, but violating it would make others uncomfortable.',
   reversed:false},
  {id:12,fid:'D',short:'Tradition',
   q:'Preserving traditions is important, even if they feel old-fashioned.',
   scenario:'Your family or cultural group has a long-standing ritual that feels outdated to you, but older relatives see it as essential.',
   reversed:false},
  {id:13,fid:'D',short:'Self-Direction',
   q:'I prefer to make my own choices and explore my own ideas, even if others disapprove.',
   scenario:'You can choose between a stable path that others recommend or an unconventional path that fits your own ideas, even if it brings uncertainty.',
   reversed:false},
  {id:14,fid:'E',short:'DIT-Heinz',
   q:'It is morally wrong to steal the medicine, even if it would save the spouse\'s life.',
   scenario:'[Heinz dilemma] A man cannot afford life-saving medicine for his dying spouse. The druggist refuses to lower the price.',
   reversed:true},
  {id:15,fid:'E',short:'DIT-Fairness',
   q:'It is acceptable to sacrifice fairness (not hiring the best candidate) in order to keep social peace.',
   scenario:'A company can hire the most qualified candidate, but some coworkers hold prejudiced views and might react badly.',
   reversed:true},
  {id:16,fid:'E',short:'DIT-Protest',
   q:'Sometimes it is necessary to break rules or laws in order to protest injustice.',
   scenario:'A community believes a new policy is unjust. Peaceful protest is ignored; a nonviolent sit-in that breaks minor laws could force attention.',
   reversed:false},
  {id:17,fid:'F',short:'WVS-Obedience',
   q:'It is more important for children to learn obedience and respect for authority than to learn independence and critical thinking.',

// STATE
// ═══════════════════════════════════════════════════════════════
const t0Values = new Array(22).fill(3);
const tnValues = new Array(22).fill(3);
let greyMode = false;
let exagScale = 1.2;
let sigmaPeak = 0.80;
let animating = false;
let animProgress = 0;
let animDuration = 6; // seconds
let animLastTime = null;

// ═══════════════════════════════════════════════════════════════
// TERRAIN MATH
// ═══════════════════════════════════════════════════════════════
function computeFactorScores(values){
  return FACTORS.map(f=>{
    const itemVals = f.items.map(id=>{
      const item = ITEMS[id-1];
      const raw = values[id-1];
      return item.reversed ? (6-raw) : raw;
    });
    const mean = itemVals.reduce((a,b)=>a+b,0) / itemVals.length;
    return (mean-1)/4; // normalize 1-5 → 0-1
  });
}

function gaussianHeight(x, z, fx, fz, sigma){
  const dx=x-fx, dz=z-fz;
  return Math.exp(-(dx*dx+dz*dz)/(2*sigma*sigma));
}

function computeHeight(x, z, factorScores){
  let h = 0.0;
  FACTORS.forEach((f,i)=>{
    h += factorScores[i] * gaussianHeight(x,z,f.peakX,f.peakZ,sigmaPeak);
  });
  return h * exagScale;
}

function computeColor(x, z, factorScores, grey){
  let wTotal = 0;
  let r=0, g=0, b=0;
  FACTORS.forEach((f,i)=>{
    const w = Math.max(0, factorScores[i]) * gaussianHeight(x,z,f.peakX,f.peakZ,sigmaPeak);
    wTotal += w;
    if(grey){ const gv=f.grey*w; r+=gv;g+=gv;b+=gv; }
    else{ r+=f.rgb[0]*w; g+=f.rgb[1]*w; b+=f.rgb[2]*w; }
  });
  if(wTotal < 1e-6){ return grey ? [0.04,0.04,0.04] : [0.04,0.06,0.10]; }
  return [r/wTotal, g/wTotal, b/wTotal];
}

// THREE.JS SETUP
// ═══════════════════════════════════════════════════════════════
const GRID = 96; // 96×96 = 9216 vertices
const TERRAIN_SIZE = 4.0;
const canvas = document.getElementById('terrain-canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = false;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060d1a);
scene.fog = new THREE.FogExp2(0x060d1a, 0.12);

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 30);
camera.position.set(0, 4, 5);
camera.lookAt(0, 0, 0);

// Lights
const ambient = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffd590, 1.8);
sun.position.set(2.5, 5, 2);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x4066bb, 0.4);
fill.position.set(-3, 2, -2);
scene.add(fill);

// Floor grid
const gridHelper = new THREE.GridHelper(TERRAIN_SIZE, 12, 0x1a2d4a, 0x0f1e30);
gridHelper.position.y = -0.05;
scene.add(gridHelper);

// Terrain geometry
const terrainGeo = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, GRID-1, GRID-1);
terrainGeo.rotateX(-Math.PI/2);

// Pre-compute xz lookup table for speed
const xzLut = new Float32Array(GRID*GRID*2);
for(let i=0;i<GRID;i++){
  for(let j=0;j<GRID;j++){
    const k=(i*GRID+j)*2;
    xzLut[k]   = -TERRAIN_SIZE/2 + j*(TERRAIN_SIZE/(GRID-1));
    xzLut[k+1] = -TERRAIN_SIZE/2 + i*(TERRAIN_SIZE/(GRID-1));
  }
}

// Add vertex colors
const colorBuf = new Float32Array(GRID*GRID*3);
terrainGeo.setAttribute('color', new THREE.BufferAttribute(colorBuf,3));
const terrainMat = new THREE.MeshPhongMaterial({
  vertexColors:true, shininess:30, specular:new THREE.Color(0x334466)
});
const terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
scene.add(terrainMesh);

// ── Update terrain geometry ──────────────────────
function updateTerrain(values, forceGrey){
  const grey = forceGrey !== undefined ? forceGrey : greyMode;
  const fs = computeFactorScores(values);
  const pos = terrainGeo.attributes.position.array;
  const col = colorBuf;
  for(let k=0;k<GRID*GRID;k++){
    const x=xzLut[k*2], z=xzLut[k*2+1];
    const h=computeHeight(x,z,fs);
    pos[k*3+1]=h;
    const [r,g,b]=computeColor(x,z,fs,grey);
    col[k*3]=r; col[k*3+1]=g; col[k*3+2]=b;
  }
  terrainGeo.attributes.position.needsUpdate=true;
  terrainGeo.attributes.color.needsUpdate=true;
  terrainGeo.computeVertexNormals();
  updateLabels(values, fs);
  updateScoreBars(fs);
}

// ORBIT CONTROLS (manual)
// ═══════════════════════════════════════════════════════════════
let azimuth = -Math.PI/4;
let polar = Math.PI/3.5;
let camRadius = 6.5;
const camTarget = new THREE.Vector3(0, 0.3, 0);
let isDragging = false;
let lastMX=0, lastMY=0;

function updateCamera(){
  camera.position.x = camTarget.x + camRadius*Math.sin(polar)*Math.sin(azimuth);
  camera.position.y = camTarget.y + camRadius*Math.cos(polar);
  camera.position.z = camTarget.z + camRadius*Math.sin(polar)*Math.cos(azimuth);
  camera.lookAt(camTarget);
}
updateCamera();

canvas.addEventListener('mousedown',e=>{isDragging=true;lastMX=e.clientX;lastMY=e.clientY;e.preventDefault();});
window.addEventListener('mousemove',e=>{
  if(!isDragging) return;
  const dx=e.clientX-lastMX, dy=e.clientY-lastMY;
  azimuth -= dx*0.012;
  polar = Math.max(0.05,Math.min(Math.PI/2-0.03, polar+dy*0.012));
  lastMX=e.clientX; lastMY=e.clientY;
  updateCamera();
});
window.addEventListener('mouseup',()=>isDragging=false);
canvas.addEventListener('wheel',e=>{
  camRadius=Math.max(2.5,Math.min(12, camRadius+e.deltaY*0.006));
  updateCamera();
  e.preventDefault();
},{passive:false});

// Touch support
let lastTouchDist=0;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){isDragging=true;lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;}
  else if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    lastTouchDist=Math.sqrt(dx*dx+dy*dy);
  }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&isDragging){
    const dx=e.touches[0].clientX-lastMX, dy=e.touches[0].clientY-lastMY;
    azimuth-=dx*0.012; polar=Math.max(0.05,Math.min(Math.PI/2-0.03,polar+dy*0.012));
    lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY; updateCamera();
  } else if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const d=Math.sqrt(dx*dx+dy*dy);
    camRadius=Math.max(2.5,Math.min(12,camRadius*(lastTouchDist/d)));
    lastTouchDist=d; updateCamera();
  }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',()=>isDragging=false);

  overlay.appendChild(div);

const tmpVec = new THREE.Vector3();
function updateLabels(values, factorScores){
  const W=canvas.clientWidth, H=canvas.clientHeight;
  FACTORS.forEach((f,i)=>{
    const h = computeHeight(f.peakX, f.peakZ, factorScores);
    tmpVec.set(f.peakX, h+0.25, f.peakZ);
    tmpVec.project(camera);
    const sx=(tmpVec.x+1)/2*W;
    const sy=(-tmpVec.y+1)/2*H;
    // Only show if in front of camera
    if(tmpVec.z > 1.0){ peakLabels[i].style.display='none'; return; }
    peakLabels[i].style.display='block';
    peakLabels[i].style.left=sx+'px';
    peakLabels[i].style.top=sy+'px';
    const rawScore = factorScores[i]*4+1;
    document.getElementById('pl-score-'+i).textContent = rawScore.toFixed(2);
  });
}

    const sn=document.getElementById('tn-sl-'+i);
    const vdn=document.getElementById('tn-vd-'+i);
    if(sn){ sn.value=3; sn.style.background='linear-gradient(90deg,var(--teal) 50%,var(--border) 50%)'; }
    if(vdn) vdn.textContent=3;
  });
  animProgress=0; animating=false;
  updateAnimProgressUI(0);
  updateTerrain(t0Values);
  FACTORS.forEach(f=>updateFactorBadge(f.id));
});

// ═══════════════════════════════════════════════════════════════
// t=n PANEL
// ═══════════════════════════════════════════════════════════════
const tnGrid = document.getElementById('tn-grid');
ITEMS.forEach((item,i)=>{

      <input type="range" class="tn-slider" id="tn-sl-${i}"

document.getElementById('tn-setup-toggle').addEventListener('click',()=>{

  document.getElementById('tn-setup-toggle').textContent=open?'t=n Setup ▾':'t=n Setup ▴';
});

// Duration
document.getElementById('dur-slider').addEventListener('input',function(){
  animDuration=parseInt(this.value);
  document.getElementById('dur-val').textContent=animDuration+'s';
  const pct=((this.value-1)/(20-1)*100)+'%';

});

// ═══════════════════════════════════════════════════════════════
// ANIMATION SYSTEM
// ═══════════════════════════════════════════════════════════════
function easeInOut(t){ return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }

function getCurrentAnimValues(){
  const e=easeInOut(animProgress);
  return t0Values.map((v,i)=> v*(1-e) + tnValues[i]*e);
}

document.getElementById('btn-anim-play').addEventListener('click',function(){
  if(animating){
    animating=false;
    this.textContent='▶ Resume';
    this.classList.remove('active');
  } else {
    if(animProgress>=1) animProgress=0;
    animating=true;
    animLastTime=null;
    this.textContent='❚❚ Pause';
    this.classList.add('active');
  }
});

document.getElementById('btn-anim-reset').addEventListener('click',()=>{
  animating=false;
  animProgress=0;
  animLastTime=null;
  document.getElementById('btn-anim-play').textContent='▶ Play';
  document.getElementById('btn-anim-play').classList.remove('active');
  updateAnimProgressUI(0);
  updateTerrain(t0Values);
});

function updateAnimProgressUI(p){
  document.getElementById('anim-progress-fill').style.width=(p*100)+'%';
  document.getElementById('anim-progress-thumb').style.left=(p*100)+'%';
  document.getElementById('anim-pct-label').textContent=Math.round(p*100)+'%';
}

// Progress bar drag
const progWrap=document.getElementById('anim-progress-wrap');
let draggingProg=false;
progWrap.addEventListener('mousedown',e=>{
  draggingProg=true;
  seekAnim(e);
  animating=false;
  document.getElementById('btn-anim-play').textContent='▶ Play';
  document.getElementById('btn-anim-play').classList.remove('active');
});
window.addEventListener('mousemove',e=>{ if(draggingProg) seekAnim(e); });
window.addEventListener('mouseup',()=>draggingProg=false);
function seekAnim(e){
  const rect=progWrap.getBoundingClientRect();
  animProgress=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  updateAnimProgressUI(animProgress);
  if(currentMode==='student'){
    const ev=easeInOut(animProgress);
    for(let i=0;i<7;i++) simpleScores[i]=animSimpleStart[i]*(1-ev)+tnSimpleScores[i]*ev;
    updateTerrainSimple();
  } else {
    updateTerrain(getCurrentAnimValues());
  }
}

// ═══════════════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════════════
function downloadPNG(grey){
  updateTerrain(animating ? getCurrentAnimValues() : t0Values, grey);
  renderer.render(scene,camera);
  const name=(document.getElementById('profile-name').value||'prf-landscape')
    .replace(/[^a-z0-9_\-]/gi,'_');
  const link=document.createElement('a');
  link.download=name+(grey?'_grey':'')+'.png';
  link.href=renderer.domElement.toDataURL('image/png');
  link.click();
  if(grey) updateTerrain(animating ? getCurrentAnimValues() : t0Values, greyMode);
}
document.getElementById('btn-dl-color').addEventListener('click',()=>downloadPNG(false));
document.getElementById('btn-dl-grey').addEventListener('click',()=>downloadPNG(true));
document.getElementById('btn-print').addEventListener('click',()=>window.print());

// ═══════════════════════════════════════════════════════════════
// RESIZE HANDLER
// ═══════════════════════════════════════════════════════════════
function resizeRenderer(){
  const W=canvas.clientWidth, H=canvas.clientHeight;
  renderer.setSize(W,H,false);
  camera.aspect=W/H;
  camera.updateProjectionMatrix();
}
const resizeObs=new ResizeObserver(resizeRenderer);
resizeObs.observe(canvas.parentElement);
resizeRenderer();

// ═══════════════════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════════════════
function renderLoop(time){
  requestAnimationFrame(renderLoop);

  if(animating){
    if(animLastTime===null) animLastTime=time;
    const dt=(time-animLastTime)/1000;
    animLastTime=time;
    animProgress=Math.min(1, animProgress+dt/animDuration);
    updateAnimProgressUI(animProgress);
    if(currentMode==='student'){
      const e=easeInOut(animProgress);
      for(let i=0;i<7;i++){
        simpleScores[i]=animSimpleStart[i]*(1-e)+tnSimpleScores[i]*e;
        const sl=document.getElementById('sp-sl-'+i);
        const vd=document.getElementById('sp-v-'+i);
        if(sl){sl.value=simpleScores[i];
          const pct=((simpleScores[i]-1)/4*100)+'%';
          sl.style.background=`linear-gradient(90deg,${FACTORS[i].hex} ${pct},#1a2d4a ${pct})`;}
        if(vd) vd.textContent=simpleScores[i].toFixed(1);
      }
      updateTerrainSimple();
    } else {
      updateTerrain(getCurrentAnimValues());
    }
    if(animProgress>=1){
      animating=false;
      document.getElementById('btn-anim-play').textContent='▶ Play';
      document.getElementById('btn-anim-play').classList.remove('active');
    }
  }

  renderer.render(scene,camera);
}


// ═══════════════════════════════════════════════════════════════
// SIMPLE (STUDENT) PANEL
// 7 sliders — one per factor — inputting factor scores directly
// ═══════════════════════════════════════════════════════════════

// Direct factor scores entered by student (1–5 scale, normalized to 0–1 internally)
const simpleScores = new Array(7).fill(3); // 3 = midpoint

const simplePanel = document.getElementById('simple-panel');
let currentMode = 'student'; // 'student' | 'researcher'

function buildSimplePanel(){
  simplePanel.innerHTML = '';

  const heading = document.createElement('div');
  heading.style.cssText = 'margin-bottom:.65rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)';
  heading.innerHTML = `
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:700;
      color:var(--teal-light);margin-bottom:.2rem">PRF Factor Scores</div>
    <div style="font-size:.65rem;color:var(--text-dim);line-height:1.5">
      Enter your score for each ethical framework dimension.<br>
      1 = Strongly Disagree &nbsp;·&nbsp; 5 = Strongly Agree
    </div>`;
  simplePanel.appendChild(heading);

  FACTORS.forEach((f, fi) => {
    const row = document.createElement('div');
    row.className = 'sp-factor-row';
    row.style.borderColor = f.hex + '44';

    const itemShorts = f.items.map(id => ITEMS[id-1].short).join(', ');

    row.innerHTML = `
      <div class="sp-factor-header">
        <span class="sp-factor-name" style="color:${f.hex}">${f.name}</span>
        <span class="sp-factor-abbr">${f.abbr}</span>
      </div>
      <div class="sp-factor-desc">${f.desc}</div>
      <div class="sp-slider-row">
        <input type="range" class="sp-slider" id="sp-sl-${fi}"
          min="1" max="5" value="${simpleScores[fi]}" step="0.1"
          style="background:linear-gradient(90deg,${f.hex} 50%,#1a2d4a 50%)">
        <span class="sp-val" id="sp-v-${fi}">${simpleScores[fi].toFixed(1)}</span>
      </div>
      <div class="sp-scale">
        <span>1 SD</span><span>2</span><span>3 N</span><span>4</span><span>5 SA</span>
      </div>
      <div class="sp-item-list">
        <div style="font-size:.58rem;color:var(--text-dim);margin-bottom:.2rem">Measured by items:</div>
        ${f.items.map(id=>`<span class="sp-item-chip">${id}·${ITEMS[id-1].short}</span>`).join('')}
      </div>`;
    simplePanel.appendChild(row);

    // Inject thumb colour
    const st = document.createElement('style');
    st.textContent = `#sp-sl-${fi}::-webkit-slider-thumb{background:${f.hex}!important;border-color:var(--bg)}`;
    document.head.appendChild(st);

    // Wire slider
    document.getElementById('sp-sl-'+fi).addEventListener('input', function(){
      const v = parseFloat(this.value);
      simpleScores[fi] = v;
      document.getElementById('sp-v-'+fi).textContent = v.toFixed(1);
      const pct = ((v-1)/4*100) + '%';
      this.style.background = `linear-gradient(90deg,${f.hex} ${pct},#1a2d4a ${pct})`;
      if(!animating) updateTerrainSimple();
    });
  });
}

// Compute terrain using simple scores directly (bypass 22-item computation)
function updateTerrainSimple(){
  const fs = simpleScores.map(v => (v-1)/4); // normalize 1–5 → 0–1
  const pos = terrainGeo.attributes.position.array;
  const col = colorBuf;
  for(let k=0;k<GRID*GRID;k++){
    const x=xzLut[k*2], z=xzLut[k*2+1];
    const h=computeHeight(x,z,fs);
    pos[k*3+1]=h;
    const [r,g,b]=computeColor(x,z,fs,greyMode);
    col[k*3]=r; col[k*3+1]=g; col[k*3+2]=b;
  }
  terrainGeo.attributes.position.needsUpdate=true;
  terrainGeo.attributes.color.needsUpdate=true;
  terrainGeo.computeVertexNormals();
  // Synthetic values for updateLabels
  const syntheticValues = t0Values; // labels use fs directly via closure trick
  updateLabelsSimple(fs);
  updateScoreBars(fs);
}

function updateLabelsSimple(fs){
  const W=canvas.clientWidth, H=canvas.clientHeight;
  FACTORS.forEach((f,i)=>{
    const h=computeHeight(f.peakX,f.peakZ,fs);
    tmpVec.set(f.peakX,h+0.25,f.peakZ);
    tmpVec.project(camera);
    const sx=(tmpVec.x+1)/2*W;
    const sy=(-tmpVec.y+1)/2*H;
    if(tmpVec.z>1.0){peakLabels[i].style.display='none';return;}
    peakLabels[i].style.display='block';
    peakLabels[i].style.left=sx+'px';
    peakLabels[i].style.top=sy+'px';
    document.getElementById('pl-score-'+i).textContent=simpleScores[i].toFixed(2);
  });
}

// ── Mode switching ────────────────────────────────────────────
function setMode(mode){
  currentMode = mode;
  const lp = document.getElementById('left-panel');
  const sp = document.getElementById('simple-panel');
  const btnS = document.getElementById('btn-mode-student');
  const btnR = document.getElementById('btn-mode-researcher');

  if(mode === 'student'){
    // Sync simple scores from computed factor scores
    const fs = computeFactorScores(t0Values);
    fs.forEach((score,i)=>{
      simpleScores[i] = parseFloat((score*4+1).toFixed(1));
      const sl = document.getElementById('sp-sl-'+i);
      const vd = document.getElementById('sp-v-'+i);
      if(sl){
        sl.value = simpleScores[i];
        const pct = ((simpleScores[i]-1)/4*100)+'%';
        sl.style.background = `linear-gradient(90deg,${FACTORS[i].hex} ${pct},#1a2d4a ${pct})`;
      }
      if(vd) vd.textContent = simpleScores[i].toFixed(1);
    });
    lp.style.display = 'none';
    sp.style.display = 'block';
    btnS.classList.add('active');
    btnR.classList.remove('active');
    updateTerrainSimple();
  } else {
    lp.style.display = 'block';
    sp.style.display = 'none';
    btnR.classList.add('active');
    btnS.classList.remove('active');
    updateTerrain(t0Values);
  }
}

document.getElementById('btn-mode-student').addEventListener('click',()=>setMode('student'));
document.getElementById('btn-mode-researcher').addEventListener('click',()=>setMode('researcher'));

// ── Override animation getCurrentAnimValues for simple mode ───
const _origGetCurrent = getCurrentAnimValues;
function getCurrentValues(){
  if(currentMode === 'student'){
    const e = easeInOut(animProgress);
    const tnSimple = tnValues.map((_,i)=>((computeFactorScores(tnValues)[i])*4+1));
    return null; // signal: use simple
  }
  return getCurrentAnimValues();
}

// Patch render loop to call correct update
const _origRenderLoop = renderLoop;
// We intercept updateTerrain calls in renderLoop:
// During animation in student mode, interpolate simpleScores toward tn factor scores
let tnSimpleScores = new Array(7).fill(3);

function syncTnSimpleScores(){
  const fs = computeFactorScores(tnValues);
  tnSimpleScores = fs.map(s=>s*4+1);
}
syncTnSimpleScores();

// Override the copy-to-tn button to also sync tnSimpleScores
document.getElementById('btn-copy-to-tn').addEventListener('click',()=>{
  syncTnSimpleScores();
},{capture:false});

// Student-mode animation: interpolate between simpleScores (at t0) and tnSimpleScores
const _origSimpleScores = [...simpleScores];
let animSimpleStart = [...simpleScores];

const origPlayBtn = document.getElementById('btn-anim-play');
origPlayBtn.addEventListener('click',()=>{
  if(currentMode==='student' && animProgress===0){
    animSimpleStart=[...simpleScores];
    syncTnSimpleScores();
  }
},{capture:false});


// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
buildSimplePanel();
// Start in Student mode by default
document.getElementById('left-panel').style.display='none';
document.getElementById('simple-panel').style.display='block';
updateTerrainSimple();
renderLoop(0);
</script>
